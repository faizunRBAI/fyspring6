---
- name: Deploy FastAPI application
  hosts: all
  become: true
  gather_facts: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: appuser
    app_group: appuser
    app_env: "{{ app_env | default('production') }}"

  tasks:
    # -----------------------------------------------------------------------
    # System packages
    # -----------------------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - python3.11
          - python3.11-venv
          - python3.11-dev
          - python3-pip
          - nginx
          - git
          - curl
          - build-essential
        state: present

    # -----------------------------------------------------------------------
    # Application user
    # -----------------------------------------------------------------------
    - name: Create application group
      group:
        name: "{{ app_group }}"
        state: present
        system: true

    - name: Create application user
      user:
        name: "{{ app_user }}"
        group: "{{ app_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ app_dir }}"
        create_home: false

    # -----------------------------------------------------------------------
    # Application directory
    # -----------------------------------------------------------------------
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    # -----------------------------------------------------------------------
    # Copy application source files
    # -----------------------------------------------------------------------
    - name: Copy requirements.txt
      copy:
        src: ../requirements.txt
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Copy main.py (top-level entrypoint)
      copy:
        src: ../main.py
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Create app package directory
      file:
        path: "{{ app_dir }}/app"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Copy app/__init__.py
      copy:
        src: ../app/__init__.py
        dest: "{{ app_dir }}/app/__init__.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Copy app/main.py
      copy:
        src: ../app/main.py
        dest: "{{ app_dir }}/app/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Copy app/config.py
      copy:
        src: ../app/config.py
        dest: "{{ app_dir }}/app/config.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Create app/routers directory
      file:
        path: "{{ app_dir }}/app/routers"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Copy app/routers/__init__.py
      copy:
        src: ../app/routers/__init__.py
        dest: "{{ app_dir }}/app/routers/__init__.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Copy app/routers/health.py
      copy:
        src: ../app/routers/health.py
        dest: "{{ app_dir }}/app/routers/health.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Copy app/routers/api.py
      copy:
        src: ../app/routers/api.py
        dest: "{{ app_dir }}/app/routers/api.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Create app/models directory
      file:
        path: "{{ app_dir }}/app/models"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Copy app/models/__init__.py
      copy:
        src: ../app/models/__init__.py
        dest: "{{ app_dir }}/app/models/__init__.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Create app/schemas directory
      file:
        path: "{{ app_dir }}/app/schemas"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Copy app/schemas/__init__.py
      copy:
        src: ../app/schemas/__init__.py
        dest: "{{ app_dir }}/app/schemas/__init__.py"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Check if public/ directory exists locally
      local_action:
        module: stat
        path: "{{ playbook_dir }}/../public"
      register: public_dir
      become: false

    - name: Create public directory on server if it exists locally
      file:
        path: "{{ app_dir }}/public"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"
      when: public_dir.stat.exists and public_dir.stat.isdir

    - name: Copy public/ directory contents if it exists
      copy:
        src: ../public/
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0644"
      when: public_dir.stat.exists and public_dir.stat.isdir

    # -----------------------------------------------------------------------
    # Python virtual environment
    # -----------------------------------------------------------------------
    - name: Create Python virtual environment at /opt/app/.venv
      command:
        cmd: python3.11 -m venv {{ venv_dir }}
        creates: "{{ venv_dir }}/bin/python"

    - name: Upgrade pip inside venv
      command:
        cmd: "{{ venv_dir }}/bin/pip install --upgrade pip"
      become_user: "{{ app_user }}"

    - name: Install application dependencies inside venv
      command:
        cmd: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
        chdir: "{{ app_dir }}"
      become_user: "{{ app_user }}"

    - name: Ensure gunicorn and uvicorn workers are installed in venv
      command:
        cmd: "{{ venv_dir }}/bin/pip install gunicorn uvicorn[standard]"
      become_user: "{{ app_user }}"

    # -----------------------------------------------------------------------
    # Environment file
    # -----------------------------------------------------------------------
    - name: Render .env file via shell
      shell: |
        cat > {{ app_dir }}/.env << 'ENVEOF'
        APP_ENV={{ app_env }}
        PORT=8000
        HOST=0.0.0.0
        ENVEOF
        chown {{ app_user }}:{{ app_group }} {{ app_dir }}/.env
        chmod 640 {{ app_dir }}/.env

    # -----------------------------------------------------------------------
    # Fix ownership of the entire app directory
    # -----------------------------------------------------------------------
    - name: Set ownership of application directory
      file:
        path: "{{ app_dir }}"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        recurse: true

    # -----------------------------------------------------------------------
    # Systemd service unit
    # -----------------------------------------------------------------------
    - name: Deploy systemd service unit for the FastAPI app
      copy:
        dest: /etc/systemd/system/fastapi-app.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI application (gunicorn + uvicorn)
          After=network.target
          Wants=network-online.target

          [Service]
          Type=exec
          User={{ app_user }}
          Group={{ app_group }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=fastapi-app

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start FastAPI application service
      systemd:
        name: fastapi-app
        enabled: true
        state: restarted

    # -----------------------------------------------------------------------
    # Nginx configuration
    # -----------------------------------------------------------------------
    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Deploy nginx virtual host configuration
      copy:
        dest: /etc/nginx/sites-available/fastapi-app
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;

              access_log /var/log/nginx/fastapi-app.access.log;
              error_log  /var/log/nginx/fastapi-app.error.log;

              location / {
                  proxy_pass         http://127.0.0.1:8000;
                  proxy_http_version 1.1;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_set_header   Upgrade           $http_upgrade;
                  proxy_set_header   Connection        "upgrade";
                  proxy_read_timeout 300s;
                  proxy_connect_timeout 75s;
              }
          }

    - name: Enable nginx fastapi-app site
      file:
        src: /etc/nginx/sites-available/fastapi-app
        dest: /etc/nginx/sites-enabled/fastapi-app
        state: link

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

    - name: Enable and restart nginx
      systemd:
        name: nginx
        enabled: true
        state: restarted

    # -----------------------------------------------------------------------
    # Post-deploy health check on the instance itself
    # -----------------------------------------------------------------------
    - name: Wait for gunicorn to be listening on port 8000
      wait_for:
        host: 127.0.0.1
        port: 8000
        timeout: 60
        state: started

    - name: Verify application health endpoint responds (localhost:8000)
      uri:
        url: http://localhost:8000/health
        method: GET
        status_code: 200
        timeout: 15
      retries: 6
      delay: 5
      register: health_result
      until: health_result.status == 200
