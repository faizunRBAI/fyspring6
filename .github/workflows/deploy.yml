name: Deploy

on:
  workflow_dispatch:

jobs:
  #  Test 
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install fastapi uvicorn gunicorn httpx pytest pytest-asyncio
          fi

      - name: Lint (advisory only)
        run: |
          pip install flake8 || true
          flake8 app/ --max-line-length=120 || true
        continue-on-error: true

      - name: Run tests
        run: |
          if [ -d tests ] && [ "$(find tests -name '*.py' | head -1)" ]; then
            pytest tests/ -v
          else
            echo "No tests found - skipping."
          fi

  #  Build / Provision 
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #  AWS credentials 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      #  SSH key generation 
      - name: Generate SSH key pair
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/deploy_key -N ""
          chmod 600 ~/.ssh/deploy_key
          echo "SSH_PUBLIC_KEY=$(cat ~/.ssh/deploy_key.pub)" >> $GITHUB_ENV

      #  Terraform 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${SSH_PUBLIC_KEY}"

      - name: Capture Terraform outputs
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          APP_URL=$(terraform output -raw app_url)
          echo "SERVER_IP=${SERVER_IP}" >> $GITHUB_ENV
          echo "APP_URL=${APP_URL}" >> $GITHUB_ENV

      #  Wait for EC2 to be ready 
      - name: Wait for SSH to be available
        run: |
          echo "Waiting for SSH on ${SERVER_IP}:22 ..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -o BatchMode=yes \
                   -i ~/.ssh/deploy_key \
                   ubuntu@${SERVER_IP} "echo ready" 2>/dev/null; then
              echo "SSH is available."
              break
            fi
            echo "Attempt ${i}/30 - waiting 10 s ..."
            sleep 10
          done

      #  Install Ansible 
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9.0,<10.0"

      #  Sync application source 
      - name: Sync application source to server
        run: |
          rsync -avz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='terraform' \
            --exclude='ansible' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='venv' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
            ./ ubuntu@${SERVER_IP}:/opt/app/

      #  Run Ansible playbook 
      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i "${SERVER_IP}," \
            -u ubuntu \
            --private-key ~/.ssh/deploy_key \
            ansible/playbook.yml \
            --extra-vars "server_ip=${SERVER_IP}"

      #  Self-verify 
      - name: Self-verify - app must respond 2xx
        run: |
          echo "Verifying app at ${APP_URL}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                      --max-time 10 \
                      "${APP_URL}/health" || true)
            echo "Attempt ${i}/12 - HTTP ${STATUS}"
            if echo "${STATUS}" | grep -qE '^(2|3)[0-9]{2}$'; then
              echo "App is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: app did not return 2xx within 2 minutes."
          exit 1

      #  Destroy on failure 
      - name: Terraform Destroy (on failure)
        if: failure()
        working-directory: terraform
        run: |-
          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${SSH_PUBLIC_KEY:-placeholder}"
